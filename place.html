<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="WDD 131 – Country that I have Visited - W03 Assignment - Country Page">
  <meta name="author" content="Wenndey Mae Ubatay">
  <title>My Place</title>
  <link rel="stylesheet" href="styles/place.css">
  <script src="scripts/place.js" defer></script>
</head>

<body>
    <header>
        <h1>Japan</h1>
    </header>

    <picture>
        <source srcset="images/small.webp" media="(max-width: 500px)">
        <source srcset="images/medium.webp" media="(max-width: 1000px)">
        <img src="images/medium.webp" alt="Mount Fuji in Japan" width="1000" height="675">
    </picture>

    <main class="container">
        <section class="about">
            <h2>About</h2>
            <p>
                Mount Fuji is Japan's highest mountain, standing at 3,776 meters.
                It is known for its beautiful symmetrical shape and snow-capped peak.
            </p>
        </section>

        <section class="weather">
            <h2>Weather</h2>
            <img src="images/weather.svg" alt="weather icon">
            <p>Temperature: <span id="temp">8</span>°C</p>
            <p>Wind Speed: <span id="wind">10</span> km/h</p>
            <p>Wind Chill: <span id="windchill"></span></p>
        </section>
    </main>

    <footer>
        <p>&copy; <span id="year"></span> Wenndey Mae Ubatay, Philippines</p>
        <p>Last Modified: <span id="modified"></span></p>
    </footer>
</body>
</html>
